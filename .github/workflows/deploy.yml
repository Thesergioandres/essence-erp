name: Deploy to Railway

on:
  push:
    branches:
      - main

concurrency:
  group: railway-production-deploy
  cancel-in-progress: true

jobs:
  deploy-railway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Railway deploy hooks
        env:
          RAILWAY_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_BACKEND_DEPLOY_HOOK_URL }}
          RAILWAY_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RAILWAY_BACKEND_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RAILWAY_BACKEND_DEPLOY_HOOK_URL"
            exit 1
          fi

          if [ -z "$RAILWAY_FRONTEND_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RAILWAY_FRONTEND_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Trigger backend deployment (Railway)
        env:
          RAILWAY_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          curl -fsS -X POST "$RAILWAY_BACKEND_DEPLOY_HOOK_URL"

      - name: Trigger frontend deployment (Railway)
        env:
          RAILWAY_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          curl -fsS -X POST "$RAILWAY_FRONTEND_DEPLOY_HOOK_URL"
