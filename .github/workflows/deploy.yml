name: Deploy to Clouding

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLOUDING_SSH_KEY }}

      - name: Deploy via SSH
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          ssh -o StrictHostKeyChecking=no deploy@93.189.89.195 << ENDSSH
            cd /home/deploy/app &&
            git reset --hard HEAD &&
            git clean -fd &&
            git pull origin main &&
            
            # Crear archivo .env en la raíz (para docker-compose)
            cat > .env << EOF
# Variables de entorno para docker-compose
MONGODB_URI=${MONGODB_URI}
REDIS_URL=redis://redis:6379
PORT=5000
JWT_SECRET=${JWT_SECRET}
NODE_ENV=production
ENABLE_CLOUDINARY=true
CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
VAPID_SUBJECT=${VAPID_SUBJECT}
MONGO_EXPRESS_USER=admin
MONGO_EXPRESS_PASS=admin123
EOF
            
            # Crear .env.production para el frontend
            cat > client/.env.production << EOF
VITE_API_URL=/api
EOF
            
            cd client && npm install && npm run build &&
            cd .. &&
            docker-compose down --remove-orphans &&
            docker system prune -af &&
            docker volume prune -f &&
            docker-compose up -d --build
          ENDSSH
