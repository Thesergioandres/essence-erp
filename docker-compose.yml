version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: essence-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: essence
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: essence-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"

  frontend:
    image: nginx:alpine
    container_name: essence-frontend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "80:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build: ./server
    container_name: essence-backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      # Otras variables de entorno necesarias
    volumes:
      - ./server:/usr/src/app

volumes:
  mongo_data:
